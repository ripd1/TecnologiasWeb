<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicios Formularios Web</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<h1>Ejercicio 1 – Información sobre el producto</h1>

<form>

<fieldset>
<legend>Datos básicos</legend>

<label>Nombre</label>
<input type="text" required>

<label>Descripción</label>
<textarea rows="4"></textarea>

<label>Foto</label>
<input type="file">

<label class="checkbox">
<input type="checkbox">
Añadir contador de visitas
</label>

</fieldset>

<fieldset>
<legend>Datos económicos</legend>

<label>Precio (€)</label>
<input type="number">

<label>Impuestos</label>
<select>
<option>4%</option>
<option>10%</option>
<option>21%</option>
</select>

<div class="radio-group">
<label>Promoción</label>

<label><input type="radio" name="promo"> Ninguno</label>
<label><input type="radio" name="promo"> Transporte gratuito</label>
<label><input type="radio" name="promo"> Descuento 5%</label>

</div>

</fieldset>

<button type="submit">Guardar producto</button>

</form>



<h1>Ejercicio 2 – Formulario de Alta</h1>

<form>

<fieldset>

<legend>Nombre y apellidos</legend>

<label>Nombre</label>
<input type="text">

<label>Primer apellido</label>
<input type="text">

<label>Segundo apellido</label>
<input type="text">

</fieldset>


<fieldset class="direccion">

<legend>Dirección</legend>

<label>Calle, número, piso, puerta</label>
<input type="text">

<label>Código postal</label>
<input type="text">

<label>Municipio</label>
<input type="text">

<label>Provincia</label>
<select>
<option>Atlántico</option>
<option>Bolívar</option>
<option>Magdalena</option>
<option>Cundinamarca</option>
</select>

<label>País</label>
<select>
<option>Colombia</option>
<option>España</option>
<option>México</option>
<option>Argentina</option>
</select>

<div class="mensaje">
El código postal es imprescindible para poder recibir los pedidos.
</div>

</fieldset>


<fieldset>

<legend>Información de contacto</legend>

<label>Email</label>
<input type="email">

<label>Teléfono</label>
<input type="tel">

</fieldset>

<button type="submit">Registrar usuario</button>

</form>

</body>
</html>
